<!doctype html>
<html lang="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
    <!-- Google Fonts only noto-sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS + daisyUI CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="main.js" defer></script>
  </head>
  <body class="m-6 w-1/2">
    <h1 class="text-xl font-bold">JS学習用</h1>
    <div class="border-2 border-gray-500 p-3 mt-2" id="default_text">
      <p>最初の文字</p>
      <input class="border-2 border-gray-500" type="text" id="input" />
    </div>
    <div class="border-2 border-gray-500 p-3 mt-2">
      <div class="flex">
        <p>回数</p>
        <span class="ml-2" id="count_area">0回</span>
      </div>
      <div>
        <button class="bg-red-600 text-white p-1 rounded-md" id="count_down">
          カウントダウン
        </button>
        <button
          class="bg-blue-600 text-white p-1 mt-2 rounded-md"
          id="count_up"
        >
          カウントアップ
        </button>
      </div>
    </div>
  </body>
</html>
